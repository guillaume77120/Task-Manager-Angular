<div class="task-container">
  <h2>Ma Liste de Tâches</h2>
  <div class="filter-bar">
    <span>Filtrer par : </span>
    <button (click)="applyFilter('all')">Toutes</button>
    <button (click)="applyFilter('high')" style="color: red;">Urgentes</button>
    <button (click)="applyFilter('medium')" style="color: orange;">Moyennes</button>
    <button (click)="applyFilter('low')" style="color: green;">Basses</button>
  </div>
  @for (task of tasks$ | async; track task.id) {
    <div class="task-card">
      <h3>{{ task.title }}</h3>
      <p>Statut : <strong>{{ task.status }}</strong></p>
      <p>Priorité : {{ task.priority }}</p>
      <button (click)="onDelete(task.id)">Supprimer</button>
    </div>
  } @empty {
    <p>Aucune tâche pour le moment. C'est l'heure de se reposer ! ☕</p>
  }
</div>
